<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网页音乐播放器</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <section class="player-shell">
        <div class="background-layer">
          <img id="background-image" src="./img/bg0.png" alt="背景图" />
        </div>
        <div class="overlay"></div>
        <div class="student-info">
          <div>学号：24215220228</div>
          <div>姓名：刘腾岳</div>
        </div>
        <div class="player-content">
          <section class="hero-section">
            <div class="record-stage">
              <div class="record-disc">
                <img id="cover-image" src="./img/record0.jpg" alt="歌曲封面" />
                <span class="record-hole"></span>
              </div>
            </div>

            <div class="track-meta">
              <h1 id="track-title">洛春赋</h1>
              <p class="track-artist">作者：<span id="track-artist">云汐</span></p>
            </div>
          </section>

          <section class="control-section">
            <input id="progress-bar" class="progress-bar" type="range" min="0" max="100" step="1" value="0" />

            <div class="control-row">
              <div class="time-panel">
                <span id="current-time">00:00</span>
                <span>/</span>
                <span id="total-time">00:00</span>
              </div>

              <div class="transport-panel">
                <button id="mode-button" class="icon-button" type="button" title="循环模式">
                  <img id="mode-icon" src="./img/mode1.png" alt="循环模式" />
                </button>
                <button id="prev-button" class="icon-button" type="button" title="上一首">
                  <img src="./img/上一首.png" alt="上一首" />
                </button>
                <button id="play-button" class="play-button" type="button" title="播放">
                  <img id="play-icon" src="./img/继续播放.png" alt="播放" />
                </button>
                <button id="next-button" class="icon-button" type="button" title="下一首">
                  <img src="./img/下一首.png" alt="下一首" />
                </button>
                <button id="volume-button" class="icon-button" type="button" title="静音">
                  <img id="volume-icon" src="./img/音量.png" alt="音量" />
                </button>
                <input id="volume-bar" class="volume-bar" type="range" min="0" max="100" step="1" value="70" />
              </div>

              <div class="extra-panel">
                <button id="mv-button" class="text-button icon-only" type="button" title="MV">
                  <img src="./img/MV.png" alt="MV" />
                </button>
                <button id="rate-button" class="text-button" type="button">1.0X</button>
                <button id="playlist-toggle" class="text-button icon-only" type="button" title="播放列表">
                  <img src="./img/列表.png" alt="播放列表" />
                </button>
              </div>
            </div>
          </section>
        </div>

        <aside id="playlist-drawer" class="playlist-drawer">
          <div class="drawer-header">
            <h2>播放列表</h2>
            <button id="drawer-close" class="drawer-close" type="button">关闭</button>
          </div>
          <div id="playlist-items" class="playlist-items"></div>
        </aside>
      </section>
    </main>

    <div id="video-modal" class="video-modal" hidden>
      <div class="video-dialog">
        <div class="drawer-header">
          <h2 id="video-title">MV 播放</h2>
          <button id="video-close" class="drawer-close" type="button">关闭</button>
        </div>
        <video id="video-player" controls preload="metadata"></video>
      </div>
    </div>

    <audio id="audio-player" preload="metadata"></audio>
    <script src="./script.js"></script>
  </body>
</html>
